          - generic [ref=f1e15]: Pind
        - paragraph [ref=f1e16]: "\"Pind\" means village. Our recipes come from one — handed down through three generations of cooks who never wrote anything down. We brought the marinades, the patience, and the fire to Canada. The tandoor is clay, the charcoal is real, and nothing leaves the kitchen until it would pass at a Punjabi wedding."
